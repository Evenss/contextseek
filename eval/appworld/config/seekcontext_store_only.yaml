experiment_name: appworld_seekcontext_store_only
dataset: test_normal
max_tasks: 0
resume: true
output_dir: ./output/appworld

appworld:
  python: ${APPWORLD_PYTHON}

agent:
  type: seekcontext_react
  model: gpt-4o
  max_steps: 25
  temperature: 0.0
  llm_api_key: ${OPENAI_API_KEY}
  # OpenAI-compatible API base URL (optional):
  llm_base_url: ${LLM_BASE_URL}
  llm_provider: openai
  store_only: true
  auto_compact: false

seekcontext:
  enabled: true
  scope: appworld/shared/test_normal/global
  storage:
    backend: file
    path: .seekcontext/appworld
  evolution:
    enabled: false
    extract_min_age_seconds: 0
  observability:
    audit_enabled: true
    audit_path: .seekcontext/appworld_audit.jsonl

distill:
  compact_after: true
  max_records: null
